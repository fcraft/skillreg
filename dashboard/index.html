<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>skillreg — Skill Registry Dashboard</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
    --text: #e1e4eb; --text-dim: #8b8fa3; --accent: #6c8cff;
    --success: #4caf50; --warn: #ff9800; --danger: #f44336;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
  }
  .app { max-width: 1200px; margin: 0 auto; padding: 24px; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px;
  }
  h1 { font-size: 24px; font-weight: 600; }
  .status { display: flex; gap: 12px; align-items: center; }
  .badge {
    padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500;
  }
  .badge-ok { background: var(--success); color: #fff; }
  .badge-warn { background: var(--warn); color: #000; }
  .badge-err { background: var(--danger); color: #fff; }
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; }
  .tab {
    padding: 8px 16px; border-radius: 6px; cursor: pointer;
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    font-size: 14px; transition: all .2s;
  }
  .tab.active, .tab:hover { background: var(--surface); color: var(--text); border-color: var(--accent); }
  .section { display: none; }
  .section.active { display: block; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .card-title { font-size: 16px; font-weight: 600; }
  .card-meta { font-size: 12px; color: var(--text-dim); }
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 500; margin-right: 4px;
  }
  .tag-cli { background: #1e3a5f; color: #6c8cff; }
  .tag-ref { background: #2d2d1e; color: #c0a050; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
  .actions { display: flex; gap: 8px; margin-top: 12px; }
  button {
    padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); cursor: pointer;
    font-size: 13px; transition: all .2s;
  }
  button:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.danger:hover { background: var(--danger); border-color: var(--danger); }
  input, select {
    padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 14px; width: 100%;
  }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; margin-bottom: 4px; font-size: 13px; color: var(--text-dim); }
  .form-row { display: flex; gap: 8px; }
  .form-row > * { flex: 1; }
  .toast {
    position: fixed; top: 16px; right: 16px; z-index: 1000;
    padding: 12px 20px; border-radius: var(--radius); font-size: 14px;
    animation: slideIn .3s ease;
  }
  .toast-success { background: var(--success); color: #fff; }
  .toast-error { background: var(--danger); color: #fff; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .empty { text-align: center; padding: 40px; color: var(--text-dim); }
  .loading { text-align: center; padding: 20px; color: var(--text-dim); }
  .target-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
  .target-item + .target-item { border-top: 1px solid var(--border); }
</style>
</head>
<body>
<div class="app" id="app">
  <header>
    <h1>&#x2699;&#xFE0F; skillreg</h1>
    <div class="status">
      <span id="ws-badge" class="badge badge-warn">no workspace</span>
      <span id="api-badge" class="badge badge-ok">API ok</span>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="skills">Skills</button>
    <button class="tab" data-tab="targets">Targets</button>
    <button class="tab" data-tab="import">Import</button>
    <button class="tab" data-tab="workspace">Workspace</button>
  </div>

  <div id="tab-skills" class="section active">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2>Skills</h2>
      <button onclick="refreshSkills()">&#x1F504; Refresh</button>
    </div>
    <div id="skills-grid" class="grid"><div class="loading">Loading...</div></div>
  </div>

  <div id="tab-targets" class="section">
    <h2 style="margin-bottom:16px">Sync Targets</h2>
    <div class="card">
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input id="target-name" placeholder="Target name" style="flex:1">
        <input id="target-path" placeholder="Path (e.g. ~/.claude/skills)" style="flex:1">
        <button onclick="addTarget()">+ Add</button>
      </div>
    </div>
    <div id="targets-list"></div>
  </div>

  <div id="tab-import" class="section">
    <h2 style="margin-bottom:16px">Import Skill</h2>
    <div class="card">
      <div class="form-group">
        <label>Source Path (local directory)</label>
        <div class="form-row">
          <input id="import-source" placeholder="/path/to/skill">
          <button onclick="importSkill()">Import</button>
        </div>
      </div>
    </div>
  </div>

  <div id="tab-workspace" class="section">
    <h2 style="margin-bottom:16px">Workspace</h2>
    <div class="card">
      <div class="form-group">
        <label>Create New Workspace</label>
        <div class="form-row">
          <input id="ws-location" placeholder="/path/to/new-workspace">
          <button onclick="createWorkspace()">Create</button>
        </div>
      </div>
    </div>
    <div id="ws-info" class="card" style="margin-top:12px">
      <div class="loading">Loading workspace info...</div>
    </div>
  </div>
</div>

<script>
var API = '/api';

function req(path, opts) {
  if (!opts) opts = {};
  return fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  }).then(function(res) {
    if (!res.ok) {
      return res.json().catch(function() { return { error: res.statusText }; })
        .then(function(err) { throw new Error(err.error || err.detail?.error || res.statusText); });
    }
    return res.json();
  });
}

function toast(msg, type) {
  if (!type) type = 'success';
  var el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 3000);
}

// Tab switching
document.querySelectorAll('.tab').forEach(function(t) {
  t.addEventListener('click', function() {
    document.querySelectorAll('.tab, .section').forEach(function(e) { e.classList.remove('active'); });
    t.classList.add('active');
    var tab = document.getElementById('tab-' + t.dataset.tab);
    if (tab) { tab.classList.add('active'); loadTab(t.dataset.tab); }
  });
});

function loadTab(tab) {
  if (tab === 'skills') loadSkills();
  else if (tab === 'targets') loadTargets();
  else if (tab === 'workspace') loadWorkspaceInfo();
}

// Workspace info
function loadWorkspaceInfo() {
  req('/health').then(function(h) {
    var badge = document.getElementById('ws-badge');
    if (h.workspace_path) {
      badge.className = 'badge badge-ok';
      badge.textContent = 'ws: ' + h.workspace_path.split('/').pop();
    }
    document.getElementById('ws-info').innerHTML = h.workspace_path
      ? '<strong>Workspace:</strong> ' + h.workspace_path + '<br><small>API: ' + h.status + '</small>'
      : '<div class="empty">No workspace configured. Create one above.</div>';
  }).catch(function() {});
}

// Skills
function loadSkills() {
  var grid = document.getElementById('skills-grid');
  req('/skills?full=1').then(function(data) {
    if (!data.skills || !data.skills.length) {
      grid.innerHTML = '<div class="empty">No skills found. Import a skill to get started.</div>';
      return;
    }
    grid.innerHTML = data.skills.map(function(s) {
      return '<div class="card">' +
        '<div class="card-header">' +
          '<span class="card-title">' + s.name + '</span>' +
          '<span class="tag ' + (s.type === 'CLI' ? 'tag-cli' : 'tag-ref') + '">' + s.type + '</span>' +
        '</div>' +
        '<div class="card-meta">' + (s.description || 'No description') + ' &middot; ' + s.fileCount + ' files &middot; ' + s.graphType + '</div>' +
        '<div class="card-meta" style="margin-top:4px">' + (s.remoteUrl || 'local') + ' &middot; ' + (s.submodulePath || 'not submodule') + '</div>' +
      '</div>';
    }).join('');
  }).catch(function(e) {
    grid.innerHTML = '<div class="empty">Error: ' + e.message + '</div>';
  });
}

function refreshSkills() {
  req('/skills/refresh').then(function() {
    loadSkills();
    toast('Skills refreshed');
  });
}

// Targets
function loadTargets() {
  req('/sync/targets').then(function(targets) {
    var list = document.getElementById('targets-list');
    if (!targets.length) {
      list.innerHTML = '<div class="empty">No sync targets configured.</div>';
      return;
    }
    list.innerHTML = targets.map(function(t) {
      return '<div class="card">' +
        '<div class="target-item">' +
          '<div><strong>' + t.name + '</strong><div class="card-meta">' + t.path + '</div></div>' +
          '<div class="actions">' +
            '<button onclick="syncTarget(\'' + t.path + '\')">Sync</button>' +
            '<button class="danger" onclick="removeTarget(\'' + t.name + '\')">Remove</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }).catch(function(e) {
    document.getElementById('targets-list').innerHTML = '<div class="empty">Error: ' + e.message + '</div>';
  });
}

function addTarget() {
  var name = document.getElementById('target-name').value.trim();
  var path = document.getElementById('target-path').value.trim();
  if (!name || !path) return toast('Name and path required', 'error');
  req('/sync/targets', {
    method: 'POST',
    body: JSON.stringify({ name: name, path: path }),
  }).then(function() {
    toast('Target added');
    document.getElementById('target-name').value = '';
    document.getElementById('target-path').value = '';
    loadTargets();
  }).catch(function(e) { toast(e.message, 'error'); });
}

function removeTarget(name) {
  req('/sync/targets/' + encodeURIComponent(name), { method: 'DELETE' }).then(function() {
    toast('Target removed');
    loadTargets();
  }).catch(function(e) { toast(e.message, 'error'); });
}

function syncTarget(target) {
  req('/sync/execute', {
    method: 'POST',
    body: JSON.stringify({ target: target }),
  }).then(function(r) {
    toast(r.success ? 'Sync completed' : 'Sync failed: ' + r.stderr, r.success ? 'success' : 'error');
  }).catch(function(e) { toast(e.message, 'error'); });
}

function importSkill() {
  var source = document.getElementById('import-source').value.trim();
  if (!source) return toast('Source path required', 'error');
  req('/import/execute', {
    method: 'POST',
    body: JSON.stringify({ sourceType: 'local', sourcePath: source }),
  }).then(function(r) {
    toast('Imported: ' + r.data.name);
    document.getElementById('import-source').value = '';
    loadSkills();
  }).catch(function(e) { toast(e.message, 'error'); });
}

function createWorkspace() {
  var loc = document.getElementById('ws-location').value.trim();
  if (!loc) return toast('Location required', 'error');
  req('/import/workspace/create', {
    method: 'POST',
    body: JSON.stringify({ location: loc }),
  }).then(function() {
    toast('Workspace created!');
    document.getElementById('ws-location').value = '';
    loadWorkspaceInfo();
  }).catch(function(e) { toast(e.message, 'error'); });
}

// Init
loadWorkspaceInfo();
loadSkills();
</script>
</body>
</html>
