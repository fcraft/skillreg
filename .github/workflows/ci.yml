name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: |
          uv pip install --system ruff
          ruff check src/ tests/

      - name: Test
        run: pytest -q

  smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install and smoke test
        run: |
          uv pip install --system -e ".[dev]"
          # Smoke: CLI runs without error
          skillreg config
          # Verify import
          python -c "from skillreg.server import create_app; app = create_app(); assert app.title == 'skillreg'"
