name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dashboard-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build dashboard
        run: cd dashboard && npm ci && npm run build

      - name: Upload dashboard dist
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist

  test:
    runs-on: ubuntu-latest
    needs: dashboard-build
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Download dashboard dist
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check version metadata
        run: uv run python scripts/check_version.py

      - name: Lint (ruff)
        run: uv run --with ruff ruff check src/ tests/ scripts/

      - name: Test
        run: uv run pytest -q

  smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Download dashboard dist
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install and smoke test
        run: |
          uv sync --extra dev
          # Smoke: CLI runs without error
          uv run skillreg config
          # Verify import
          uv run python -c "from skillreg.server import create_app; app = create_app(); assert app.title == 'skillreg'"
