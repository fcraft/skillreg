openapi: "3.0.3"
info:
  title: skillreg v1 API
  description: |
    skillreg v1 API contract — frozen from agent-hub v1 route domains.
    Covers sync / registry / skills / import / files / git / submodules / hooks.
    v1.x excluded: ssh / kanban / agent / terminal / compat.
  version: "1.0.0"
  contact:
    name: kexjhhuang
servers:
  - url: http://127.0.0.1:8787
    description: Local development server

paths:
  # ── Health ──────────────────────────────────────────────────────────────
  /api/health:
    get:
      operationId: health
      summary: Service health + workspace pointer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/HealthConfigured"
                  - $ref: "#/components/schemas/HealthUnconfigured"

  # ── Skills ─────────────────────────────────────────────────────────────
  /api/skills:
    get:
      operationId: fetchSkills
      summary: List skills (lightweight / full)
      parameters:
        - name: full
          in: query
          schema: { type: string, enum: ["1"] }
          description: Set to "1" for full mode (repoNodes + submodules + relationships + gitLogs)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/SkillsLite"
                  - $ref: "#/components/schemas/SkillsFull"

  /api/skills/refresh:
    get:
      operationId: refreshSkills
      summary: Force refresh skill registry
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsFull"

  /api/skills/{id}:
    get:
      operationId: getSkill
      summary: Single skill detail
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/skills/{id}/relationships:
    get:
      operationId: getSkillRelationships
      summary: Skill relationships
      parameters:
        - $ref: "#/components/parameters/SkillId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  skill: { type: string }
                  relationships:
                    type: array
                    items: { $ref: "#/components/schemas/Relationship" }
        "404":
          $ref: "#/components/responses/NotFound"

  /api/skills/{id}/stats:
    get:
      operationId: getSkillStats
      summary: Skill statistics
      parameters:
        - $ref: "#/components/parameters/SkillId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  name: { type: string }
                  fileCount: { type: integer }
                  type: { type: string }
                  path: { type: string }
        "404":
          $ref: "#/components/responses/NotFound"

  /api/skills/{id}/tree:
    get:
      operationId: getSkillTree
      summary: Skill file tree
      parameters:
        - $ref: "#/components/parameters/SkillId"
      responses:
        "200":
          description: OK (same structure as /api/files/tree)
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/skills/{id}/file:
    get:
      operationId: getSkillFile
      summary: Skill file content
      parameters:
        - $ref: "#/components/parameters/SkillId"
        - name: path
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK (same structure as /api/files/content)

  /api/skills/{id}/export:
    get:
      operationId: exportSkill
      summary: Export skill as zip
      parameters:
        - $ref: "#/components/parameters/SkillId"
      responses:
        "200":
          description: Zip binary
          content:
            application/zip:
              schema: { type: string, format: binary }

  # ── Sync ───────────────────────────────────────────────────────────────
  /api/sync/config:
    get:
      operationId: getSyncConfig
      summary: Get full sync config
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncConfig"

  /api/sync/status:
    get:
      operationId: getSyncStatus
      summary: Sync status per target per skill
      parameters:
        - name: target
          in: query
          schema: { type: string }
        - name: include_projects
          in: query
          schema: { type: string, enum: ["true"] }
        - name: skill
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SyncStatusRow" }

  /api/sync/targets:
    get:
      operationId: getSyncTargets
      summary: Target list with status overview
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SyncTarget" }
    post:
      operationId: addSyncTarget
      summary: Add a new sync target
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, path]
              properties:
                name: { type: string }
                path: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  target: { $ref: "#/components/schemas/SyncTargetEntry" }
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /api/sync/targets/{name}:
    delete:
      operationId: removeSyncTarget
      summary: Remove a target
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  removed: { type: string }

  /api/sync/targets/{name}/skills:
    put:
      operationId: updateTargetSkills
      summary: Update target skill whitelist
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [skills]
              properties:
                skills:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: OK

  /api/sync/targets/{name}/rename:
    put:
      operationId: renameSyncTarget
      summary: Rename a target
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newName]
              properties:
                newName: { type: string }
      responses:
        "200":
          description: OK

  /api/sync/execute:
    post:
      operationId: executeSync
      summary: Execute sync (target or project)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target: { type: string }
                project: { type: string }
                skills:
                  type: array
                  items: { type: string }
                dryRun: { type: boolean }
      responses:
        "200":
          description: OK

  /api/sync/skill-presence:
    get:
      operationId: getSkillPresence
      summary: Which targets have this skill
      parameters:
        - name: skill
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

  /api/sync/target-skills:
    get:
      operationId: getTargetSkills
      summary: List skills in a target
      parameters:
        - name: target
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

  /api/sync/diff:
    get:
      operationId: getSkillDiff
      summary: File-level diff for a skill in a target
      parameters:
        - name: skill
          in: query
          required: true
          schema: { type: string }
        - name: target
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

  /api/sync/remove-skill:
    post:
      operationId: removeSkillFromTarget
      summary: Remove a skill from a target
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [skill, target]
              properties:
                skill: { type: string }
                target: { type: string }
                force: { type: boolean }
      responses:
        "200":
          description: OK

  /api/sync/target-file:
    get:
      operationId: getTargetFile
      summary: Read file from a target
      parameters:
        - name: skill
          in: query
          required: true
          schema: { type: string }
        - name: target
          in: query
          required: true
          schema: { type: string }
        - name: path
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

  /api/sync/discover-home:
    get:
      operationId: discoverHomeAgentDirs
      summary: Auto-discover agent dirs under ~/
      responses:
        "200":
          description: OK

  /api/sync/discover:
    get:
      operationId: discoverAgentDirs
      summary: Auto-discover agent dirs at a path
      parameters:
        - name: path
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

  /api/sync/projects:
    get:
      operationId: listProjects
      summary: List all projects
      responses:
        "200":
          description: OK
    post:
      operationId: createProject
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, targets]
              properties:
                name: { type: string }
                targets:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: OK

  /api/sync/projects/{id}:
    get:
      operationId: getProject
      summary: Get project detail
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteProject
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

  /api/sync/projects/{id}/targets:
    post:
      operationId: addProjectTarget
      summary: Add target to project
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
      responses:
        "200":
          description: OK
    delete:
      operationId: removeProjectTarget
      summary: Remove target from project
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
      responses:
        "200":
          description: OK

  # ── Registry ────────────────────────────────────────────────────────────
  /api/registry/register:
    post:
      operationId: registerSkill
      summary: Register an external skill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourcePath]
              properties:
                sourcePath: { type: string }
                force: { type: boolean }
      responses:
        "200":
          description: OK

  /api/registry/convert:
    post:
      operationId: convertSkill
      summary: Convert a file skill to a CLI repo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        "200":
          description: OK

  /api/registry/list:
    get:
      operationId: listRegisteredSkills
      summary: List all registered skills
      responses:
        "200":
          description: OK

  # ── Import ─────────────────────────────────────────────────────────────
  /api/import/upload:
    post:
      operationId: importUploadZip
      summary: Upload and extract a zip file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "200":
          description: OK

  /api/import/validate:
    post:
      operationId: importValidate
      summary: Validate an import source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceType, sourcePath]
              properties:
                sourceType: { type: string }
                sourcePath: { type: string }
      responses:
        "200":
          description: OK

  /api/import/execute:
    post:
      operationId: importExecute
      summary: Execute a skill import
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceType, sourcePath]
              properties:
                sourceType: { type: string }
                sourcePath: { type: string }
                tempPath: { type: string }
                renameTo: { type: string }
                force: { type: boolean }
      responses:
        "200":
          description: OK

  /api/import/preview-update:
    post:
      operationId: importPreviewUpdate
      summary: Preview changes for a skill update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourcePath, skillName]
              properties:
                sourcePath: { type: string }
                skillName: { type: string }
      responses:
        "200":
          description: OK

  /api/import/execute-update:
    post:
      operationId: importExecuteUpdate
      summary: Execute a skill update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourcePath, skillName]
              properties:
                sourcePath: { type: string }
                skillName: { type: string }
                tempPath: { type: string }
      responses:
        "200":
          description: OK

  /api/import/git-clone:
    post:
      operationId: importGitClone
      summary: Clone a git repo and discover skills
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string }
                branch: { type: string }
      responses:
        "200":
          description: OK

  /api/import/git-import:
    post:
      operationId: importGitExecute
      summary: Execute git import (skill or submodule mode)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode: { type: string, enum: [skill, submodule] }
                url: { type: string }
                branch: { type: string }
                tempPath: { type: string }
                selectedSkills:
                  type: array
                  items: { type: string }
                targetDir: { type: string }
                targetPath: { type: string }
      responses:
        "200":
          description: OK

  /api/import/cleanup:
    post:
      operationId: importCleanup
      summary: Clean up temp directory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tempPath]
              properties:
                tempPath: { type: string }
      responses:
        "200":
          description: OK

  # ── Files ──────────────────────────────────────────────────────────────
  /api/files/tree:
    get:
      operationId: fetchFileTree
      summary: Get file tree (cached 30s, depth≤4, nodes≤300)
      parameters:
        - name: root
          in: query
          schema: { type: string, default: "." }
          description: Root directory relative to workspace
      responses:
        "200":
          description: OK — tree root node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileTreeNode"
        "403":
          $ref: "#/components/responses/Error"

  /api/files/content:
    get:
      operationId: fetchFileContent
      summary: Read file content (≤100KB, binary detection, language recognition)
      parameters:
        - name: root
          in: query
          schema: { type: string, default: "." }
        - name: path
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/TextFileContent"
                  - $ref: "#/components/schemas/BinaryFileContent"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"

  # ── Git ────────────────────────────────────────────────────────────────
  /api/git/logs:
    get:
      operationId: fetchGitLogs
      summary: Get git commit history
      parameters:
        - name: scope
          in: query
          schema: { type: string, enum: [all, main, submodule], default: all }
        - name: path
          in: query
          schema: { type: string }
          description: Submodule path (required when scope=submodule)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitLogs"

  # ── Submodules ─────────────────────────────────────────────────────────
  /api/submodules:
    get:
      operationId: fetchSubmodules
      summary: List all submodules with status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Submodule" }

  /api/submodules/sync-preview:
    post:
      operationId: previewSyncSubmodule
      summary: Preview sync actions without executing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
      responses:
        "200":
          description: OK

  /api/submodules/diff:
    post:
      operationId: fetchSubmoduleDiff
      summary: Read-only diff of dirty tracked files
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
      responses:
        "200":
          description: OK

  /api/submodules/sync:
    post:
      operationId: syncSubmodule
      summary: Sync a single submodule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
                commitMessage: { type: string }
      responses:
        "200":
          description: OK

  /api/submodules/refresh:
    post:
      operationId: refreshSubmodule
      summary: Read-only fetch against remote, recompute status
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                path: { type: string }
      responses:
        "200":
          description: OK

  /api/submodules/fix-detached:
    post:
      operationId: fixDetachedHead
      summary: Fix detached HEAD for a submodule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
      responses:
        "200":
          description: OK

  # ── Hooks ──────────────────────────────────────────────────────────────
  /api/hooks/scan:
    get:
      operationId: scanHooks
      summary: Scan available hook scripts
      responses:
        "200":
          description: OK

  /api/hooks/status:
    get:
      operationId: getHookStatus
      summary: Full status — available + installed + third-party
      parameters:
        - name: local
          in: query
          schema: { type: integer, enum: [0, 1] }
      responses:
        "200":
          description: OK

  /api/hooks:
    get:
      operationId: fetchHooks
      summary: Alias for /api/hooks/status
      parameters:
        - name: local
          in: query
          schema: { type: integer, enum: [0, 1] }
      responses:
        "200":
          description: OK

  /api/hooks/install:
    post:
      operationId: installHook
      summary: Install a hook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hookId]
              properties:
                hookId: { type: string }
                local: { type: boolean }
                dryRun: { type: boolean }
      responses:
        "200":
          description: OK

  /api/hooks/uninstall:
    post:
      operationId: uninstallHook
      summary: Uninstall a hook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hookId]
              properties:
                hookId: { type: string }
                local: { type: boolean }
                dryRun: { type: boolean }
      responses:
        "200":
          description: OK

  /api/hooks/validate:
    post:
      operationId: validateHooks
      summary: Validate installed hook scripts exist
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        "200":
          description: OK
        "500":
          $ref: "#/components/responses/Error"

components:
  parameters:
    SkillId:
      name: id
      in: path
      required: true
      schema: { type: string }
      description: Skill identifier (name)

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
    Forbidden:
      description: Access denied
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
    Error:
      description: Error
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }

  schemas:
    # ── Health ───────────────────────────────────────────────────────
    HealthConfigured:
      type: object
      properties:
        status: { type: string, example: "ok" }
        workspace_path: { type: string, example: "/Users/kex/my-workspace" }

    HealthUnconfigured:
      type: object
      properties:
        status: { type: string, example: "ok" }
        workspace_path: { type: "null" }
        message: { type: string }

    # ── Skills ───────────────────────────────────────────────────────
    SkillsLite:
      type: object
      properties:
        skills:
          type: array
          items: { $ref: "#/components/schemas/Skill" }
        generatedAt: { type: string, format: date-time }

    SkillsFull:
      allOf:
        - $ref: "#/components/schemas/SkillsLite"
        - type: object
          properties:
            repoNodes:
              type: array
              items: { $ref: "#/components/schemas/RepoNode" }
            submodules:
              type: array
              items: { $ref: "#/components/schemas/Submodule" }
            relationships:
              type: array
              items: { $ref: "#/components/schemas/Relationship" }
            gitLogs: { $ref: "#/components/schemas/GitLogs" }

    Skill:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        type: { type: string, enum: [CLI, Reference] }
        graphType: { type: string, enum: [isolated-skill, cli-skill, repo-cli, repo-skill] }
        parentNode: { type: string, nullable: true }
        path: { type: string }
        skillFilePath: { type: string }
        fileCount: { type: integer }
        remoteUrl: { type: string, nullable: true }
        parentSkill: { type: "null" }
        isSubmodule: { type: boolean }
        submodulePath: { type: string, nullable: true }

    RepoNode:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        type: { type: string, enum: [repo-cli, repo-skill] }
        graphType: { type: string, enum: [repo-cli, repo-skill] }
        parentNode: { type: "null" }
        path: { type: string }
        skillFilePath: { type: "null" }
        fileCount: { type: integer }
        remoteUrl: { type: string, nullable: true }
        parentSkill: { type: "null" }
        isSubmodule: { type: boolean }
        submodulePath: { type: string }
        isSubmoduleRoot: { type: boolean }
        branch: { type: string }

    Submodule:
      type: object
      properties:
        path: { type: string }
        branch: { type: string }
        description: { type: string }
        remoteUrl: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/SubmoduleStatus" }

    SubmoduleStatus:
      type: object
      properties:
        commit: { type: string, nullable: true }
        ahead: { type: integer }
        behind: { type: integer }
        dirty: { type: boolean }
        syncState:
          type: string
          enum: [synced, ahead, behind, diverged, dirty, missing, unknown]
        isDetached: { type: boolean }
        indexRef: { type: string, nullable: true }
        indexAhead: { type: integer }
        indexBehind: { type: integer }
        indexDirty: { type: boolean }
        checkedAt: { type: integer, nullable: true }

    Relationship:
      type: object
      properties:
        from: { type: string }
        to: { type: string }
        type: { type: string, enum: [contains, depends-on] }

    # ── Sync ─────────────────────────────────────────────────────────
    SyncConfig:
      type: object
      properties:
        schema_version: { type: integer }
        targets:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              path: { type: string }
              skills:
                type: array
                items: { type: string }
        sources:
          type: array
          items:
            type: object
            properties:
              path: { type: string }
              mode: { type: string, enum: [skill, scan] }
        exclude_dirs:
          type: array
          items: { type: string }
        exclude_files:
          type: array
          items: { type: string }
        manifest:
          type: object
          properties:
            enabled: { type: boolean }
            skip_unchanged: { type: boolean }
            file: { type: string }

    SyncStatusRow:
      type: object
      properties:
        target: { type: string }
        name: { type: string }
        status: { type: string }
        _project: { type: string }
        _projectId: { type: string }

    SyncTarget:
      type: object
      properties:
        name: { type: string }
        path: { type: string }
        status:
          type: object
          additionalProperties:
            type: string

    SyncTargetEntry:
      type: object
      properties:
        name: { type: string }
        path: { type: string }

    # ── Files ────────────────────────────────────────────────────────
    FileTreeNode:
      type: object
      properties:
        name: { type: string }
        path: { type: string }
        type: { type: string, enum: [dir, file] }
        children:
          type: array
          items: { $ref: "#/components/schemas/FileTreeNode" }

    TextFileContent:
      type: object
      properties:
        content: { type: string }
        language: { type: string }
        size: { type: integer }

    BinaryFileContent:
      type: object
      properties:
        binary: { type: boolean }
        size: { type: integer }

    # ── Git ──────────────────────────────────────────────────────────
    GitLogs:
      type: object
      properties:
        main:
          type: array
          items: { $ref: "#/components/schemas/LogEntry" }
        submodules:
          type: object
          additionalProperties:
            type: array
            items: { $ref: "#/components/schemas/LogEntry" }

    LogEntry:
      type: object
      properties:
        hash: { type: string }
        message: { type: string }
        author: { type: string }
        date: { type: string }
